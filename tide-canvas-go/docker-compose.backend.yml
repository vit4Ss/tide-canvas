# TideCanvas —— 只部署 Go 后端，连【现有】tc-mysql / tc-redis（不接管、不重建它们）。
#
# 采用 host 网络：容器共享宿主机网络栈，直接连 127.0.0.1:3306 / 127.0.0.1:6379
# （tc-mysql/tc-redis 已把端口映射到宿主机），因此 .env 里的 DB_HOST=127.0.0.1 /
# REDIS_ADDR=127.0.0.1:6379 原样可用，无需改任何地址。仅适用于 Linux 宿主机。
#
# 用法（在 tide-canvas-go/ 目录）：
#   docker stop tc-backend                                      # 先让出 8080
#   docker compose -f docker-compose.backend.yml up -d --build
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: tide-canvas-go:latest
    container_name: tc-go
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./.env:/app/.env:ro      # godotenv 读它（含空格引号的 MAIL_PASSWORD 也能正确解析）
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}
