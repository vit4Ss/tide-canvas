<!DOCTYPE html>
<html lang="zh">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com" />

<link rel="stylesheet" href="liuguang/pages.css" />
<link rel="stylesheet" href="liuguang/studio.css" />

</head>
<body class="studio-body">

<div class="ws" style="grid-template-columns:104px 1fr">

  <aside class="ws-rail">
    <a class="ws-brand" href="首页-流光.html" title="SCARECROW AI">
      <span class="glyph"></span>
      <b>SCARECROW</b>
    </a>
    <div class="ws-rail-sp"></div>
    <nav class="ws-nav">
      <a class="ws-tool" href="首页-流光.html" title="发现">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-2 5-5 2 2-5z"/></svg>
        <span>发现</span>
      </a>
      <a class="ws-tool" href="创作台.html" title="创作">
        <svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 1 4 10.5c-.7.6-1 1-1 2H9c0-1-.3-1.4-1-2A6 6 0 0 1 12 3z"/></svg>
        <span>创作</span>
      </a>
      <a class="ws-tool on" href="对话.html" title="生成">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>生成</span>
      </a>
      <a class="ws-tool" href="作品广场.html" title="作品广场">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>作品广场</span>
      </a>
      <a class="ws-tool" href="灵感.html" title="灵感">
        <svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 2v2M4.9 5l1.4 1.4M2 12h2M19.1 5l-1.4 1.4M20 12h2"/><path d="M9 14a4 4 0 1 1 6 0c-.5.5-1 1-1 2h-4c0-1-.5-1.5-1-2z"/></svg>
        <span>灵感</span>
      </a>
    </nav>
    <div class="ws-nav-div"></div>
    <a class="ws-tool" href="资产.html" title="资产">
      <svg viewBox="0 0 24 24"><path d="M3 7l2-3h5l2 3h7a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3z"/></svg>
      <span>资产</span>
    </a>
    <div class="ws-rail-sp"></div>
    <a class="ws-upgrade" href="定价.html">
      <div class="ws-upgrade-top"><span class="star">★</span> 低至 ¥39/月</div>
      <div class="ws-upgrade-btn">升级 Pro</div>
    </a>
    <button class="ws-tool" title="通知" data-toast="暂无新通知">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      <span>通知</span>
    </button>
    <a class="ws-tool" href="#" title="登录" data-toast="登录 · 高保真原型">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      <span>登录</span>
    </a>
  </aside>

  <div class="chat-wrap">
    <!-- conversation list -->
    <aside class="chat-list">
      <div class="chat-list-top">
        <button class="chat-new" id="chatNew"><span>＋</span> 新对话</button>
      </div>
      <div class="chat-convos" id="convos"></div>
    </aside>

    <!-- chat main -->
    <main class="chat-main">
      <div class="chat-top">
        <span class="ti" id="chatTitle">守护者 · 影片创作</span>
        <span class="acct">gudexin748@gmail.com ▾</span>
      </div>
      <div class="chat-thread" id="thread"><div class="chat-inner" id="threadInner"></div></div>
      <div class="chat-composer">
        <div class="composer-box">
          <div class="composer-head">
            <button class="cm-upload" id="cmUpload" title="上传参考素材">＋</button>
            <textarea id="composer" placeholder="描述你想生成的内容，或上传参考素材让模型自由发挥…  输入 / 使用技能，@ 添加主体"></textarea>
          </div>
          <div class="composer-bar">
            <button class="cm-chip on" data-toggle><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18"/></svg>联网</button>
            <button class="cm-chip">文生视频 ▾</button>
            <button class="cm-chip">Kling-VIDEO-3.0-Pro ▾</button>
            <button class="cm-chip">1:1 ▾</button>
            <button class="cm-chip">1080p ▾</button>
            <button class="cm-chip">5s ▾</button>
            <button class="cm-chip">⚲ 2 ▾</button>
            <span class="sp"></span>
            <span class="cm-pts">约 100 积分</span>
            <button class="cm-send" id="chatSend" aria-label="发送">↑</button>
          </div>
        </div>
        <div class="chat-hint">Enter 发送 · Shift+Enter 换行 · 可拖拽 / 粘贴添加参考</div>
      </div>
    </main>
  </div>
</div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="20" fill="#05060c" />
    <path d="M78 56a8 8 0 0 1-8 8H38l-16 14V32a8 8 0 0 1 8-8h32a8 8 0 0 1 8 8z" fill="none" stroke="#6d8bf5" stroke-width="6"/>
  </svg>
</template>

<script src="liuguang/home-data.js"></script>
<script src="liuguang/shell.js"></script>
<script src="liuguang/chat.js"></script>
</body>
</html>
