<body>

<div id="nav-slot"></div>

<main class="block page-top">
  <div class="wrap">
    <div class="sec-head" style="flex-direction:column; align-items:center; text-align:center; gap:0">
      <span class="eyebrow reveal"><span class="d"></span>价格方案 · PRICING</span>
      <h1 class="reveal" style="font-family:var(--disp); font-size:clamp(32px,4.8vw,58px); font-weight:800; letter-spacing:-.03em; margin:14px 0 0; line-height:1.04;">选一个节奏，<span class="gtext">开始创作</span></h1>

    </div>

    <div style="display:flex; justify-content:center; margin-top:30px">
      <div class="bill-toggle reveal" id="bill">
        <button class="on" data-b="yr">年付 <span class="save">省 42%</span></button>

        <h2 class="sec-title reveal">看清每一分<span class="gtext">算力</span></h2>
      </div>
      <div style="overflow-x:auto" class="reveal">
        <table class="cmp" id="cmp"></table>
      </div>
    </section>

    <section class="block">
      <div class="sec-head" style="flex-direction:column; align-items:center; text-align:center">
        <span class="eyebrow reveal"><span class="d"></span>常见问题 · FAQ</span>
        <h2 class="sec-title reveal" style="max-width:none">关于<span class="gtext">付费</span>，你可能想问</h2>
      </div>
      <div class="faq price-faq" id="faq"></div>
    </section>

    <section class="block" style="padding-bottom:0">
      <div class="cta reveal-scale">
        <div class="cta-glow"></div>
        <h2>仍在犹豫？<br /><span class="gtext">先免费试一张</span></h2>
        <p>注册即送体验积分，无需绑定信用卡。喜欢了再升级。</p>
        <div class="cta-actions">
