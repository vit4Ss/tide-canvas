</head>
<body class="studio-body">

<div class="ws ws--canvas">

  <!-- full-height app sidebar -->

    <a class="ws-brand" href="首页-流光.html" title="SCARECROW AI">
      <span class="glyph"></span>
      <b>SCARECROW</b>
    </a>

    <div class="ws-rail-sp"></div>

    <nav class="ws-nav">
      <a class="ws-tool" href="首页-流光.html" title="发现">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-2 5-5 2 2-5z"/></svg>
        <span>发现</span>
      </a>
      <a class="ws-tool" href="创作台.html" title="创作">
        <svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 1 4 10.5c-.7.6-1 1-1 2H9c0-1-.3-1.4-1-2A6 6 0 0 1 12 3z"/></svg>
        <span>创作</span>
      </a>
      <a class="ws-tool" href="对话.html" title="生成">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>生成</span>
      </a>
      <a class="ws-tool on" href="画布.html" title="画布">
        <svg viewBox="0 0 24 24"><path d="M3 8V5a2 2 0 0 1 2-2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M21 16v3a2 2 0 0 1-2 2h-3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><circle cx="12" cy="12" r="3"/></svg>
        <span>画布</span>
      </a>
      <a class="ws-tool" href="作品广场.html" title="作品广场">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>作品广场</span>
      </a>
      <a class="ws-tool" href="灵感.html" title="灵感">
        <svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 2v2M4.9 5l1.4 1.4M2 12h2M19.1 5l-1.4 1.4M20 12h2"/><path d="M9 14a4 4 0 1 1 6 0c-.5.5-1 1-1 2h-4c0-1-.5-1.5-1-2z"/></svg>
        <span>灵感</span>
      </a>
    </nav>

    <div class="ws-nav-div"></div>
    <a class="ws-tool" href="资产.html" title="资产">
      <svg viewBox="0 0 24 24"><path d="M3 7l2-3h5l2 3h7a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3z"/></svg>
      <span>资产</span>
    </a>

    <div class="ws-rail-sp"></div>

    <a class="ws-upgrade" href="定价.html">
      <div class="ws-upgrade-top"><span class="star">★</span> 低至 ¥39/月</div>
      <div class="ws-upgrade-btn">升级 Pro</div>
    </a>
    <button class="ws-tool" title="通知" data-toast="暂无新通知">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      <span>通知</span>
    </button>
    <a class="ws-tool" href="#" title="登录" data-toast="登录 · 高保真原型">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      <span>登录</span>
    </a>
  </aside>

  <!-- content -->
  <main class="cv">

    <!-- ── project library ── -->
    <div class="cv-lib" id="cvLib">
      <div class="cv-lib-glow"></div>
      <div class="cv-lib-in">
        <div class="cv-lib-top">
          <div>
            <div class="cv-crumb"><span class="d"></span>画布 · CANVAS</div>
            <h1 class="cv-lib-title">在无限画布上自由创作</h1>
            <p class="cv-lib-sub">把提示词、图片与视频铺在同一张画布上，拖拽、连线、衍生——让每个想法自然生长。</p>
          </div>
          <div class="cv-lib-tools">
            <div class="cv-search"><span class="ic">⌕</span><input placeholder="搜索项目…" /></div>
            <button class="cv-sort" data-toast="排序方式 · 最近修改">⇅ 最近修改</button>
          </div>
        </div>

        <div class="cv-secline"><h2>最近项目</h2><span class="n" id="cvCount">0</span></div>
        <div class="cv-grid" id="cvGrid"></div>
      </div>
    </div>

    <!-- ── infinite canvas editor ── -->
    <div class="cv-editor" id="cvEditor">
      <div class="cv-ed-top">
        <button class="cv-back" id="cvBack"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>项目库</button>
        <div class="cv-ed-name"><input id="cvEdName" value="未命名项目" spellcheck="false" /></div>
        <span class="cv-ed-save"><span class="dot"></span>已自动保存</span>
        <div class="sp"></div>
        <div class="cv-ed-actions">
          <div class="cv-ed-zoom">
            <button id="cvZoomOut" title="缩小">−</button>
            <span class="pct" id="cvZoomPct">100%</span>
            <button id="cvZoomIn" title="放大">+</button>
            <button id="cvZoomReset" title="适应屏幕">⊡</button>
          </div>
          <div class="cv-ed-avatars">
            <span class="av" style="background:linear-gradient(135deg,#6d8bf5,#9b7bf0)"></span>
            <span class="av" style="background:linear-gradient(135deg,#57c9e8,#6d8bf5)"></span>
          </div>
          <button class="cv-ed-btn" data-toast="协作链接已复制">⤴ 分享</button>
          <button class="cv-ed-btn pri" data-toast="已导出当前画布">⤓ 导出</button>
        </div>
      </div>

      <div class="cv-viewport" id="cvViewport">
        <div class="cv-world" id="cvWorld">
          <svg class="cv-wires" id="cvWires" viewBox="0 0 8000 8000" preserveAspectRatio="none"></svg>
        </div>

        <!-- left tool dock -->
        <div class="cv-dock">
          <button data-tool="select" class="on"><svg viewBox="0 0 24 24"><path d="M5 3l14 7-6 2-2 6z"/></svg><span class="tip">选择 / 移动</span></button>
          <button data-tool="hand"><svg viewBox="0 0 24 24"><path d="M8 13V5a2 2 0 0 1 4 0v6"/><path d="M12 11V4a2 2 0 0 1 4 0v8"/><path d="M16 11V6a2 2 0 0 1 4 0v8a6 6 0 0 1-6 6h-2a6 6 0 0 1-5-3l-3-5a2 2 0 0 1 3-2l2 2"/></svg><span class="tip">抓手 / 平移</span></button>
          <div class="div"></div>
          <button data-tool="image"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M21 16l-5-5L5 20"/></svg><span class="tip">图像节点</span></button>
          <button data-tool="frame"><svg viewBox="0 0 24 24"><path d="M5 3v18M19 3v18M3 5h18M3 19h18"/></svg><span class="tip">画框</span></button>
          <button data-tool="text"><svg viewBox="0 0 24 24"><path d="M4 6V4h16v2M9 20h6M12 4v16"/></svg><span class="tip">文本</span></button>
        </div>

        <!-- empty hint -->
        <div class="cv-ed-hint" id="cvHint">
          <div class="gl"></div>
          <h3>空白画布，无限可能</h3>
          <p>在下方写一句提示词开始生成，或从左侧拖入图像。按住空白处可平移，<kbd>Ctrl</kbd> + 滚轮缩放。</p>
        </div>

        <!-- bottom prompt bar -->
        <div class="cv-promptbar">
          <span class="spark">✦</span>
          <button class="cv-pmodel" data-toast="切换模型 · 原型"><span class="sw">F</span>Flux.1 Pro ▾</button>
          <input id="cvPrompt" placeholder="描述你想生成的内容，回车即可在画布上生成…" />
          <button class="cv-pgen" id="cvPgen">✦ 生成</button>
        </div>

        <div class="cv-help">
          <span class="k"><kbd>拖拽</kbd> 平移</span>
          <span class="k"><kbd>Ctrl</kbd>+滚轮 缩放</span>
          <span class="k"><kbd>Esc</kbd> 返回</span>
        </div>
      </div>
    </div>

  </main>
</div>

    <rect x="32" y="58" width="26" height="20" rx="3" fill="#9b7bf0" />

</body>
</html>
