spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tide_canvas?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      # 本地 Docker Redis 已启用 requirepass：IDE 直跑需在运行配置里设 REDIS_PASSWORD(值见 tide-canvas-server/.env)
      password: ${REDIS_PASSWORD:}
      database: 0

logging:
  level:
    com.tidecanvas: debug
