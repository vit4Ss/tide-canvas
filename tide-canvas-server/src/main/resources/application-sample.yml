server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: tide-canvas-server
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:100MB}
      max-request-size: ${MAX_REQUEST_SIZE:100MB}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS:true}
          ssl:
            enable: ${MAIL_SSL:false}
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:10000}
          timeout: ${MAIL_TIMEOUT:10000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:10000}

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 默认关闭：knife4j 4.5.0 的 OpenApiCustomizer 与 springdoc 2.7+ 不兼容，开启会把 /v3/api-docs 打成 500；
# 生产环境也不应将 API 文档暴露公网。本地调试需要时以 KNIFE4J_ENABLE=true 临时开启。
knife4j:
  enable: ${KNIFE4J_ENABLE:false}
  setting:
    language: zh_cn

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:7200000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

mail:
  enabled: ${MAIL_ENABLED:true}
  from-address: ${MAIL_FROM_ADDRESS:}
  from-name: ${MAIL_FROM_NAME:TideCanvas}
  reply-to: ${MAIL_REPLY_TO:}
  code-ttl-seconds: ${MAIL_CODE_TTL_SECONDS:600}
  resend-cooldown-seconds: ${MAIL_RESEND_COOLDOWN_SECONDS:60}
  max-attempts: ${MAIL_MAX_ATTEMPTS:5}
  socks-host: ${MAIL_SOCKS_HOST:}
  socks-port: ${MAIL_SOCKS_PORT:7897}

storage:
  kind: ${STORAGE_KIND:local}
  local-dir: ${STORAGE_DIR:./uploads}
  oss-endpoint: ${OSS_ENDPOINT:}
  oss-access-key-id: ${OSS_ACCESS_KEY_ID:}
  oss-access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  oss-bucket: ${OSS_BUCKET:}
  oss-prefix: ${OSS_PREFIX:uploads/}
  oss-cdn-domain: ${OSS_CDN_DOMAIN:}
  max-size: ${STORAGE_MAX_SIZE:52428800}
  allowed-types: ${STORAGE_ALLOWED_TYPES:image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm}
