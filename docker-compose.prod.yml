# ============================================================
# TideCanvas 生产部署编排（服务器上使用）
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# 架构：Caddy(80/443, 自动HTTPS) → frontend(Next.js) → /api/* 内网代理 → backend(8080)
# 后端/MySQL/Redis 均不暴露公网；后端仅绑定服务器回环口便于调试。
# ============================================================

services:
  mysql:
    image: mysql:8.0
    container_name: tc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: tide_canvas
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      # 仅首次初始化（空数据卷）时自动执行
      - ./tide-canvas-server/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --init-connect=SET NAMES utf8mb4
      - --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tc-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./tide-canvas-server
      dockerfile: Dockerfile
    container_name: tc-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # 仅服务器本机可达，便于 curl 调试；公网流量一律走 Caddy→frontend 代理
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: tide_canvas
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?请在 .env 设置 JWT_SECRET（强随机串）}
      CORS_ALLOWED_ORIGINS: ${SITE_URL:-http://localhost:3000}
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms256m -Xmx1024m -Duser.timezone=Asia/Shanghai"
      # 邮件：默认直连 SMTP（spring.mail.* 的默认值在 application.yml）。
      # 服务器无法直连 Gmail（如大陆机房）时，要么配 MAIL_SOCKS_HOST 走代理，要么换 SMTP 服务商。
      MAIL_SOCKS_HOST: ${MAIL_SOCKS_HOST:-}
      MAIL_SOCKS_PORT: ${MAIL_SOCKS_PORT:-7897}
      # SMTP 账号默认取 application.yml 内置值(该文件不入库,部署时单独上传);.env 可覆盖
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-}
      # OAuth 第三方登录(可选)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./tide-canvas-web
      dockerfile: Dockerfile
      args:
        # SSR 直连与 /api/* 代理目标：指向编排内后端服务（构建期固化）
        NEXT_PUBLIC_API_BASE_URL: http://backend:8080
        NEXT_PUBLIC_OAUTH_REDIRECT_BASE: ${SITE_URL:-}
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_WECHAT_APP_ID: ${WECHAT_APP_ID:-}
    container_name: tc-frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: tc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # 填域名（如 canvas.example.com）则自动签发 HTTPS；无域名临时用 ":80" 以 IP 访问
      SITE_ADDRESS: ${SITE_ADDRESS:?请在 .env 设置 SITE_ADDRESS（域名或 :80）}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
