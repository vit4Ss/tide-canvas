# TideCanvas 生产整站编排 —— 后端为 Go 版（tide-canvas-go）。
#
#   Internet -> Caddy(80/443 HTTPS) -> frontend(Next.js :3000)
#                                      -> /api/* rewrites -> backend(Go :8080)
#                                                            -> mysql / redis（仅内网）
#
# 启动： docker compose --env-file .env -f docker-compose.prod.yml up -d --build
# 配置： 全部来自根目录 .env（见 .env.prod.example）。backend 段把 .env 里的
#        通用 key 映射成 Go 所需的环境变量（系统环境变量优先级高于镜像内默认）。
# 回滚到旧 Java 后端： 用 docker-compose.java.yml（结构相同，仅 backend 为 Spring Boot）。
#
# 注：mysql/redis/frontend/caddy 与 docker-compose.java.yml 完全一致，
#     因此在已有部署上执行本文件时，compose 只会重建 backend，其余容器保持不动。

services:
  mysql:
    image: mysql:8.0
    container_name: tc-mysql
    restart: unless-stopped
    ports:
      # 仅绑定服务器回环口：配合 SSH 隧道远程管理数据库,绝不直接暴露 3306 到公网
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: tide_canvas
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      # 仅在数据卷为空的首次启动执行；现网卷已初始化则不生效。
      # 后端为 Go 版且无 AutoMigrate，全新库用 Go schema 初始化（建表 + 初始 admin/配置）。
      - ./tide-canvas-go/sql/schema.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --init-connect=SET NAMES utf8mb4
      - --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tc-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      REDISCLI_AUTH: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./tide-canvas-go
      dockerfile: Dockerfile
    container_name: tc-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # ---- 基础 ----
      SERVER_PORT: "8080"
      SNOWFLAKE_NODE_ID: "1"
      DEBUG: "false"
      TZ: Asia/Shanghai
      # ---- MySQL（容器内走 compose 服务名 mysql）----
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: tide_canvas
      # ---- Redis（容器内走 compose 服务名 redis）----
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      # ---- JWT ----
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_ACCESS_TTL: "7200"
      JWT_REFRESH_TTL: "604800"
      # ---- CORS ----
      CORS_ALLOWED_ORIGINS: ${SITE_URL:-http://localhost:3000}
      CORS_ALLOW_CREDENTIALS: "true"
      # ---- 邮件 SMTP ----
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-TideCanvas}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
      # ---- 文件存储（oss 推荐；local 时写 uploads 卷）----
      STORAGE_KIND: ${STORAGE_KIND:-oss}
      STORAGE_LOCAL_DIR: /app/uploads
      STORAGE_MAX_SIZE: ${STORAGE_MAX_SIZE:-52428800}
      STORAGE_ALLOWED_TYPES: ${STORAGE_ALLOWED_TYPES:-image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm}
      STORAGE_OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      STORAGE_OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      STORAGE_OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      STORAGE_OSS_BUCKET: ${OSS_BUCKET:-}
      STORAGE_OSS_PREFIX: ${OSS_PREFIX:-uploads/}
      STORAGE_OSS_CDN_DOMAIN: ${OSS_CDN_DOMAIN:-}
      # ---- OAuth（留空=禁用对应第三方登录）----
      OAUTH_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OAUTH_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      OAUTH_WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      # ---- 日志（容器内输出到 stdout，由 docker 收集）----
      LOG_LEVEL: info
      LOG_FORMAT: json
      LOG_OUTPUT: stdout
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./tide-canvas-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:8080
        NEXT_PUBLIC_OAUTH_REDIRECT_BASE: ${SITE_URL:-}
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_WECHAT_APP_ID: ${WECHAT_APP_ID:-}
    container_name: tc-frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: tc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?Set SITE_ADDRESS in .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
