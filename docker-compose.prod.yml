services:
  mysql:
    image: mysql:8.0
    container_name: tc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: tide_canvas
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./tide-canvas-server/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --init-connect=SET NAMES utf8mb4
      - --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tc-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./tide-canvas-server
      dockerfile: Dockerfile
    container_name: tc-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: tide_canvas
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_USE_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${SITE_URL:-http://localhost:3000}
      CORS_ALLOW_CREDENTIALS: "true"
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-100MB}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-100MB}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-TideCanvas}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_STARTTLS: ${MAIL_STARTTLS:-true}
      MAIL_SSL: ${MAIL_SSL:-false}
      MAIL_SOCKS_HOST: ${MAIL_SOCKS_HOST:-}
      MAIL_SOCKS_PORT: ${MAIL_SOCKS_PORT:-7897}
      STORAGE_KIND: ${STORAGE_KIND:-local}
      STORAGE_DIR: /app/uploads
      STORAGE_MAX_SIZE: ${STORAGE_MAX_SIZE:-52428800}
      STORAGE_ALLOWED_TYPES: ${STORAGE_ALLOWED_TYPES:-image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_PREFIX: ${OSS_PREFIX:-uploads/}
      OSS_CDN_DOMAIN: ${OSS_CDN_DOMAIN:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms256m -Xmx1024m -Duser.timezone=Asia/Shanghai"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./tide-canvas-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:8080
        NEXT_PUBLIC_OAUTH_REDIRECT_BASE: ${SITE_URL:-}
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_WECHAT_APP_ID: ${WECHAT_APP_ID:-}
    container_name: tc-frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: tc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?Set SITE_ADDRESS in .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
